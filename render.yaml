services:
  - type: web
    name: e-codex-play
    runtime: node
    plan: starter
    region: virginia
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
    disk:
      name: e-codex-data
      mountPath: /var/data
      sizeGB: 1
